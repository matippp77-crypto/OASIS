<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis - Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --green: #25d366; }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark);
            color: white;
            /* Habilitar perspectiva 3D para el body */
            perspective: 1500px;
        }

        /* Contenedor principal que se moverá en 3D */
        .main-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out; /* Suavizar el movimiento */
            /* Fondo Nocturno Degradado */
            background: linear-gradient(to bottom, #1a1a2e 0%, #0a0a0a 100%);
        }

        /* Fondo Animado de Líneas (dentro del wrapper 3D) */
        #vanta-bg { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            z-index: 1; 
            opacity: 0.4; 
            transform: translateZ(-50px); /* Ligeramente hacia atrás en 3D */
        }

        /* Estilo para la Luna (dentro del wrapper 3D) */
        .moon {
            position: absolute;
            top: 50px;
            right: 50px;
            width: 100px;
            height: 100px;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 50px 10px rgba(212, 175, 55, 0.7);
            z-index: 2;
            transform: translateZ(50px); /* Ligeramente hacia adelante en 3D */
        }

        .container {
            position: relative; 
            z-index: 3; /* Arriba de todo */
            display: flex; 
            flex-direction: column; 
            align-items: center;
            justify-content: center; 
            min-height: 100vh; 
            text-align: center; 
            padding: 20px;
            /* Radial Gradient overlay for depth */
            background: radial-gradient(circle, rgba(10,10,10,0.3) 0%, rgba(10,10,10,0.8) 100%);
            transform: translateZ(100px); /* Los botones son los más cercanos en 3D */
        }

        h1 {
            font-size: clamp(3rem, 10vw, 5rem); letter-spacing: 12px;
            margin: 0; color: var(--gold); text-shadow: 0 0 25px rgba(212, 175, 55, 0.6);
            font-weight: 600;
        }

        .button-group { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; margin-top: 25px; }

        .btn {
            text-decoration: none; padding: 16px; border-radius: 12px;
            font-weight: 600; text-transform: uppercase; transition: 0.3s;
            text-align: center; cursor: pointer; border: none; font-size: 0.85rem;
            display: block;
        }

        .btn-canal { background: var(--gold); color: #000; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); }
        .btn-retiros { background: rgba(0,0,0,0.8); color: var(--gold); border: 1px solid var(--gold); backdrop-filter: blur(10px); }
        
        .btn-lineas { background: var(--green); color: white; font-size: 0.75rem; padding: 12px; box-shadow: 0 4px 10px rgba(37, 211, 102, 0.2); }
        .support-label { font-size: 0.7rem; opacity: 0.8; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px;}

        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        @media (max-width: 768px) {
            h1 { letter-spacing: 6px; }
            .moon { width: 60px; height: 60px; top: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <!-- Nuevo Wrapper Principal 3D -->
    <div class="main-wrapper" id="scene">
        
        <!-- Fondo de Líneas (dentro del wrapper 3D) -->
        <div id="vanta-bg"></div>

        <!-- Luna Brillante (dentro del wrapper 3D) -->
        <div class="moon"></div>

        <!-- Contenedor de Botones (dentro del wrapper 3D) -->
        <div class="container">
            <h1>OASIS</h1>
            
            <div class="button-group">
                <a href="https://whatsapp.com/channel/0029Vb7TNUXJP20yPDX5Ga1p" class="btn btn-canal">Canal Oficial</a>
                
                <div onclick="openChat()" class="btn btn-retiros">RETIROS</div>
                
                <div class="support-label">Líneas de Respaldo:http://googleusercontent.com/image_generation_content/175
