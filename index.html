<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis - Plataforma Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --black: #000000;
        }

        body {
            background-color: var(--black);
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            perspective: 1200px;
        }

        /* CONTENEDOR PARA ELIMINAR CUADRADOS */
        .character-container {
            position: fixed;
            right: -20px;
            bottom: 0;
            z-index: -1;
            width: 90%;
            max-width: 750px;
            pointer-events: none;
            transition: transform 0.1s ease-out;
            /* Máscara radial para ocultar bordes con cuadros */
            -webkit-mask-image: radial-gradient(circle at center right, black 30%, transparent 85%);
            mask-image: radial-gradient(circle at center right, black 30%, transparent 85%);
        }

        .character-bg {
            width: 100%;
            /* Filtros para que el negro de los cuadros se vuelva invisible contra el fondo */
            filter: brightness(1.1) contrast(1.2) drop-shadow(0 0 30px rgba(255,204,0,0.2));
        }

        .content {
            width: 90%;
            max-width: 450px;
            text-align: center;
            padding-top: 30px;
            z-index: 2;
        }

        h1 {
            font-size: 3.5rem;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 0;
            text-shadow: 0 0 20px rgba(0,0,0,1);
        }

        .promo-tag {
            background: #ff0000;
            color: white;
            padding: 6px 20px;
            border-radius: 50px;
            font-weight: 900;
            display: inline-block;
            margin-bottom: 25px;
            font-size: 0.9rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,0,0,0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255,0,0,0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,0,0,0); }
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            background: var(--gold);
            color: black;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border-radius: 14px;
            font-weight: 900;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-play {
            background: #fff;
            border: 3px solid var(--gold);
            font-size: 1.4rem;
            margin-bottom: 8px;
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 204, 0, 0.5); }

        .btn-whatsapp { background: #25d366; color: white; font-size: 1rem; padding: 14px; }
        
        .label-respaldo {
            margin-top: 20px;
            font-weight: bold;
            color: var(--gold);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .extra-info { font-size: 0.7rem; margin-top: 30px; color: #444; }

    </style>
</head>
<body>

    <div class="character-container" id="personaje">
        <!-- Se usa la imagen que subiste: personaje.png -->
        <img src="assets/img/personaje.png" class="character-bg" alt="Oasis">
    </div>

    <div class="content">
        <h1>OASIS</h1>
        <div class="promo-tag">🔥 EXTRA 30% DE REGALO 🔥</div>

        <div class="btn-group">
            <a href="https://greenvip.net" class="btn btn-play">🎰 ¡JUGÁ YA! 🎰</a>
            <a href="https://greenvip.net" class="btn">💳 CARGAS ONLINE</a>
            <button onclick="window.callbell.open()" class="btn">💰 RETIROS (CHAT)</button>
            <a href="https://whatsapp.com/channel/0029Vb7TNUXJP20yPDX5Ga1p" class="btn">📢 UNITE AL CANAL</a>
            
            <p class="label-respaldo">NÚMEROS DE CARGA DE RESPALDO:</p>
            <a href="https://wa.me/5491122334455" class="btn btn-whatsapp">✅ CARGAS RESPALDO 1</a>
            <a href="https://wa.me/5491166778899" class="btn btn-whatsapp">✅ CARGAS RESPALDO 2</a>
        </div>

        <p class="extra-info">OASIS ELITE © 2026 - SOPORTE 24HS</p>
    </div>

    <!-- SCRIPT MOVIMIENTO 3D -->
    <script>
        document.addEventListener('mousemove', (e) => {
            const img = document.getElementById('personaje');
            const x = (window.innerWidth / 2 - e.pageX) / 40;
            const y = (window.innerHeight / 2 - e.pageY) / 40;
            // Movimiento 3D que oculta los bordes rotando la imagen
            img.style.transform = `translateX(${x}px) translateY(${y}px) rotateY(${x/1.2}deg) rotateX(${-y/1.2}deg)`;
        });
        
        window.addEventListener('deviceorientation', (e) => {
            const img = document.getElementById('personaje');
            img.style.transform = `rotateY(${e.gamma / 2}deg) rotateX(${e.beta / 2}deg)`;
        });
    </script>

      (function(){var w=window;var d=document;var l=function(){var s=d.createElement('script');s.async=true;s.src='https://dash.callbell.eu/include/livechat/'+window.callbellSettings.script_token+'/'+window.callbellSettings.uuid+'.js';var x=d.getElementsByTagName('script')[0];x.parentNode.insertBefore(s,x);};w.addEventListener('load',l,false);})();
    </script>

</body>
</html>
