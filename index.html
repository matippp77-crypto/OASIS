<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Oasis Elite</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root {
      --gold: #ffcc00;
      --green: #25d366;
      --green-dark: #128c44;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      color: white;
      min-height: 100svh;
      background-image:
        linear-gradient(
          90deg,
          rgba(0,0,0,0.94) 0%,
          rgba(0,0,0,0.78) 45%,
          rgba(0,0,0,0.42) 100%
        ),
        url("assets/img/fondo-oasis.png");
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.18);
      z-index: 0;
      pointer-events: none;
    }

    .page {
      width: 100%;
      min-height: 100svh;
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: flex-start;
      align-items: flex-start;
      padding: 14px 0 24px 8vw;
    }

    .content {
      width: min(470px, 92vw);
      text-align: center;
      position: relative;
      z-index: 5;
    }

    h1 {
      font-size: clamp(3.1rem, 6vw, 4.6rem);
      line-height: 1;
      letter-spacing: clamp(3px, 0.6vw, 6px);
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 22px;
      text-shadow:
        0 0 12px rgba(255,204,0,0.85),
        0 0 34px rgba(255,204,0,0.32),
        0 6px 20px rgba(0,0,0,0.95);
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      width: 100%;
      min-height: 60px;
      padding: 14px 18px;
      border: none;
      border-radius: 18px;
      text-decoration: none;
      text-transform: uppercase;
      font-size: 1.05rem;
      font-weight: 900;
      cursor: pointer;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      user-select: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      box-shadow:
        0 7px 0 rgba(125, 92, 0, 0.96),
        0 14px 28px rgba(0, 0, 0, 0.56),
        inset 0 2px 0 rgba(255, 255, 255, 0.58);
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.01);
      filter: brightness(1.05);
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow:
        0 2px 0 rgba(125, 92, 0, 0.96),
        0 8px 16px rgba(0, 0, 0, 0.38),
        inset 0 1px 0 rgba(255, 255, 255, 0.35);
    }

    .btn-play {
      background: linear-gradient(180deg, #ffffff 0%, #f3f3f3 55%, #cfcfcf 100%);
      border: 3px solid var(--gold);
      font-size: 1.15rem;
    }

    .btn-main {
      background: linear-gradient(180deg, #ffe45f 0%, #ffcc00 58%, #d6a800 100%);
    }

    .btn-whatsapp {
      background: linear-gradient(180deg, #37f38e 0%, var(--green) 58%, var(--green-dark) 100%);
      color: white;
      min-height: 50px;
      font-size: 0.92rem;
      box-shadow:
        0 6px 0 #0b6d32,
        0 12px 22px rgba(0, 0, 0, 0.36),
        inset 0 2px 0 rgba(255, 255, 255, 0.38);
    }

    #menu-respaldo {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: -3px;
      animation: openMenu 0.25s ease;
    }

    @keyframes openMenu {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .canal-wrapper {
      margin-top: 4px;
      background: rgba(0,0,0,0.54);
      border: 1px solid rgba(255,204,0,0.48);
      border-radius: 26px;
      padding: 17px;
      box-shadow:
        0 0 0 1px rgba(255,204,0,0.07),
        0 14px 38px rgba(0,0,0,0.62);
      backdrop-filter: blur(6px);
    }

    .btn-extra {
      background: linear-gradient(180deg, #ff4a4a 0%, #e00000 58%, #8a0000 100%);
      color: #fff;
      font-size: 1.55rem;
      border: 2px solid rgba(255,255,255,0.95);
      margin-bottom: 12px;
      box-shadow:
        0 7px 0 #610000,
        0 14px 26px rgba(0,0,0,0.46),
        inset 0 2px 0 rgba(255,255,255,0.42);
    }

    .canal-text {
      color: #f2f2f2;
      font-size: 0.84rem;
      font-weight: 700;
      line-height: 1.45;
      text-shadow: 0 2px 5px rgba(0,0,0,0.90);
    }

    .canal-text b {
      color: var(--gold);
    }

    .footer-status {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    .status-box {
      background: rgba(0,0,0,0.56);
      border: 2px solid var(--gold);
      border-radius: 14px;
      padding: 12px 8px;
      color: var(--gold);
      font-size: 0.80rem;
      font-weight: 900;
      text-transform: uppercase;
      box-shadow:
        0 0 12px rgba(255,204,0,0.18),
        0 8px 18px rgba(0,0,0,0.44);
      text-shadow: 0 2px 4px rgba(0,0,0,0.85);
    }

    .extra-info {
      margin-top: 16px;
      font-size: 0.68rem;
      color: rgba(255,255,255,0.58);
      font-weight: 700;
      text-shadow: 0 2px 4px rgba(0,0,0,0.85);
    }

    .character-container {
      position: fixed;
      right: 7vw;
      bottom: 52px;
      z-index: 3;
      width: clamp(180px, 22vw, 245px);
      pointer-events: none;
      opacity: 0.98;
      perspective: 1200px;
      transform-style: preserve-3d;
      transition: transform 0.18s ease-out;
      animation: characterFloat 6s ease-in-out infinite;
    }

    .character-bg {
      width: 100%;
      display: block;
      object-fit: contain;
      filter:
        drop-shadow(0 18px 34px rgba(0,0,0,0.72))
        contrast(101%)
        brightness(100%)
        saturate(101%);
      animation: character3D 7s ease-in-out infinite;
    }

    @keyframes characterFloat {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-9px);
      }
    }

    @keyframes character3D {
      0%, 100% {
        transform: rotateY(-2.5deg) rotateX(0.8deg);
      }
      50% {
        transform: rotateY(2.5deg) rotateX(-0.8deg);
      }
    }

    .birds-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .real-bird {
      position: absolute;
      width: 48px;
      height: 30px;
      opacity: 0.38;
      filter:
        drop-shadow(0 0 4px rgba(255,255,255,0.20))
        drop-shadow(0 6px 8px rgba(0,0,0,0.35));
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    .body-bird {
      position: absolute;
      left: 20px;
      top: 14px;
      width: 16px;
      height: 8px;
      background: rgba(255,255,255,0.88);
      border-radius: 50%;
    }

    .body-bird::after {
      content: "";
      position: absolute;
      right: -5px;
      top: 1px;
      width: 7px;
      height: 6px;
      background: rgba(255,255,255,0.88);
      border-radius: 50%;
    }

    .wing {
      position: absolute;
      top: 12px;
      width: 28px;
      height: 12px;
      background: rgba(255,255,255,0.82);
      border-radius: 100% 100% 20% 20%;
    }

    .wing.left {
      left: 0;
      transform-origin: right center;
      animation: flapLeft 0.38s ease-in-out infinite alternate;
    }

    .wing.right {
      right: 0;
      transform-origin: left center;
      animation: flapRight 0.38s ease-in-out infinite alternate;
    }

    @keyframes flapLeft {
      0% {
        transform: rotate(-34deg) translateY(4px) scaleY(1.05);
      }
      100% {
        transform: rotate(34deg) translateY(-7px) scaleY(0.85);
      }
    }

    @keyframes flapRight {
      0% {
        transform: rotate(34deg) translateY(4px) scaleY(1.05);
      }
      100% {
        transform: rotate(-34deg) translateY(-7px) scaleY(0.85);
      }
    }

    .bird-a {
      top: 12%;
      left: -90px;
      animation: birdFlyA 12s infinite;
    }

    .bird-b {
      top: 24%;
      left: -120px;
      opacity: 0.30;
      animation: birdFlyB 17s infinite;
      animation-delay: 3s;
    }

    .bird-c {
      top: 8%;
      left: -140px;
      opacity: 0.25;
      animation: birdFlyC 21s infinite;
      animation-delay: 7s;
    }

    @keyframes birdFlyA {
      0% {
        transform: translateX(-120px) translateY(0) scale(1.05) rotate(0deg);
      }
      35% {
        transform: translateX(36vw) translateY(-18px) scale(1.12) rotate(-8deg);
      }
      70% {
        transform: translateX(76vw) translateY(14px) scale(1.05) rotate(7deg);
      }
      100% {
        transform: translateX(116vw) translateY(5px) scale(1.05) rotate(0deg);
      }
    }

    @keyframes birdFlyB {
      0% {
        transform: translateX(-140px) translateY(0) scale(0.82) rotate(0deg);
      }
      50% {
        transform: translateX(58vw) translateY(-18px) scale(0.84) rotate(-6deg);
      }
      100% {
        transform: translateX(116vw) translateY(8px) scale(0.82) rotate(0deg);
      }
    }

    @keyframes birdFlyC {
      0% {
        transform: translateX(-160px) translateY(0) scale(0.68) rotate(0deg);
      }
      52% {
        transform: translateX(56vw) translateY(18px) scale(0.70) rotate(8deg);
      }
      100% {
        transform: translateX(116vw) translateY(-6px) scale(0.68) rotate(0deg);
      }
    }

    #chat-pointer {
      display: none;
      position: fixed;
      bottom: 118px;
      right: 42px;
      z-index: 1000;
      text-align: center;
      color: var(--gold);
      animation: bounce 0.8s infinite;
    }

    #chat-pointer .pointer-label {
      background: var(--gold);
      color: #000;
      padding: 7px 14px;
      border-radius: 12px;
      font-weight: 900;
      font-size: 0.72rem;
      margin-bottom: 6px;
      box-shadow: 0 0 14px rgba(255,204,0,0.45);
      white-space: nowrap;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-14px);
      }
    }

    /* TABLET */
    @media (max-width: 1024px) {
      .page {
        padding-left: 5vw;
      }

      .content {
        width: min(470px, 58vw);
      }

      .character-container {
        right: 4vw;
        width: clamp(170px, 24vw, 230px);
      }
    }

    /* CELULAR */
    @media (max-width: 768px) {
      body {
        background-attachment: scroll;
        background-position: center center;
      }

      .page {
        justify-content: center;
        padding: 12px 10px 24px;
      }

      .content {
        width: min(94vw, 430px);
      }

      h1 {
        font-size: clamp(2.9rem, 14vw, 4rem);
        margin-bottom: 18px;
      }

      .btn-group {
        gap: 12px;
      }

      .btn {
        min-height: 54px;
        font-size: 0.95rem;
        border-radius: 16px;
      }

      .btn-play {
        font-size: 1rem;
      }

      .btn-extra {
        font-size: 1.30rem;
      }

      .canal-wrapper {
        padding: 14px;
        background: rgba(0,0,0,0.60);
      }

      .canal-text {
        font-size: 0.78rem;
      }

      .status-box {
        font-size: 0.70rem;
        padding: 10px 6px;
      }

      .character-container {
        right: -72px;
        bottom: 50px;
        width: 190px;
        opacity: 0.58;
        z-index: 2;
      }

      .birds-layer {
        display: none;
      }

      #chat-pointer {
        right: 22px;
        bottom: 110px;
      }
    }

    /* CELULAR MUY ANGOSTO */
    @media (max-width: 380px) {
      h1 {
        font-size: 3rem;
      }

      .btn {
        min-height: 51px;
        font-size: 0.86rem;
      }

      .btn-extra {
        font-size: 1.15rem;
      }

      .canal-text {
        font-size: 0.72rem;
      }

      .status-box {
        font-size: 0.64rem;
      }

      .character-container {
        width: 170px;
        right: -76px;
      }
    }
  </style>
</head>

<body>

  <div class="birds-layer">
    <div class="real-bird bird-a">
      <span class="wing left"></span>
      <span class="wing right"></span>
      <span class="body-bird"></span>
    </div>

    <div class="real-bird bird-b">
      <span class="wing left"></span>
      <span class="wing right"></span>
      <span class="body-bird"></span>
    </div>

    <div class="real-bird bird-c">
      <span class="wing left"></span>
      <span class="wing right"></span>
      <span class="body-bird"></span>
    </div>
  </div>

  <div class="character-container" id="personaje">
    <img src="assets/img/personaje.png" class="character-bg" alt="Personaje Oasis">
  </div>

  <main class="page">
    <section class="content">
      <h1>OASIS</h1>

      <div class="btn-group">

        <a href="https://greenvip.net" target="_blank" rel="noopener noreferrer" class="btn btn-play">
          🎰 ¡Jugá ya! 🎰
        </a>

        <button onclick="toggleCargas()" class="btn btn-main">
          💳 Cargas respaldo
        </button>

        <div id="menu-respaldo">
          <a href="https://wa.me/5491122334455" target="_blank" rel="noopener noreferrer" class="btn btn-whatsapp">
            ✅ Respaldo 1
          </a>

          <a href="https://wa.me/5491166778899" target="_blank" rel="noopener noreferrer" class="btn btn-whatsapp">
            ✅ Respaldo 2
          </a>
        </div>

        <button onclick="abrirRetiros()" class="btn btn-main">
          💰 Retiros
        </button>

        <div class="canal-wrapper">
          <a href="https://whatsapp.com/channel/0029Vb7TNUXJP20yPDX5Ga1p" target="_blank" rel="noopener noreferrer" class="btn btn-extra">
            30% EXTRA 💎
          </a>

          <div class="canal-text">
            📲 Mandanos una captura mostrando que te uniste al canal y activaste la campanita 🔔<br>
            y llevate un <b>30% EXTRA</b> en tu próxima gestión 🚀
          </div>
        </div>

        <div class="footer-status">
          <div class="status-box">🟢 Retiros 24hs</div>
          <div class="status-box">🟢 Cargas 24hs</div>
        </div>

      </div>

      <p class="extra-info">OASIS ELITE © 2026 - SOPORTE 24HS</p>
    </section>
  </main>

  <div id="chat-pointer">
    <div class="pointer-label">RETIRÁ AQUÍ</div>
    <i class="fas fa-arrow-down fa-2x"></i>
  </div>

  <script>
    function toggleCargas() {
      const menu = document.getElementById('menu-respaldo');
      menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
    }

    function abrirRetiros() {
      if (window.callbell && typeof window.callbell.open === 'function') {
        window.callbell.open();
      } else {
        let intento = setInterval(() => {
          if (window.callbell && typeof window.callbell.open === 'function') {
            window.callbell.open();
            clearInterval(intento);
          }
        }, 500);

        setTimeout(() => clearInterval(intento), 6000);
      }

      const arrow = document.getElementById('chat-pointer');
      arrow.style.display = 'block';

      setTimeout(() => {
        arrow.style.display = 'none';
      }, 7000);
    }

    document.addEventListener('mousemove', (e) => {
      if (window.innerWidth < 768) return;

      const personaje = document.getElementById('personaje');
      const x = (window.innerWidth / 2 - e.clientX) / 95;
      const y = (window.innerHeight / 2 - e.clientY) / 130;

      personaje.style.transform = `
        translateY(-4px)
        rotateY(${x}deg)
        rotateX(${-y}deg)
      `;
    });

    document.addEventListener('mouseleave', () => {
      const personaje = document.getElementById('personaje');
      personaje.style.transform = 'translateY(0) rotateY(0deg) rotateX(0deg)';
    });
  </script>

  <script>
    window.callbellSettings = {
      uuid: "7980a6c9-f027-4666-82a7-4258788e21dd",
      script_token: "GMfea5tb5E84JacftXguuZba"
    };

    (function () {
      var w = window;
      var d = document;
      var l = function () {
        var s = d.createElement('script');
        s.async = true;
        s.src = 'https://dash.callbell.eu/include/livechat/' + window.callbellSettings.script_token + '/' + window.callbellSettings.uuid + '.js';
        var x = d.getElementsByTagName('script')[0];
        x.parentNode.insertBefore(s, x);
      };
      w.addEventListener('load', l, false);
    })();
  </script>

</body>
</html>
