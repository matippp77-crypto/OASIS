<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis - Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow-x: hidden;
            font-family: 'Poppins', sans-serif; background-color: #0a0a0a; color: white;
        }

        /* Fondo de líneas 3D */
        #vanta-bg { position: fixed; width: 100%; height: 100%; z-index: -1; }

        .container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; text-align: center; 
            padding: 20px; box-sizing: border-box;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem); /* Tamaño fluido según pantalla */
            letter-spacing: clamp(5px, 2vw, 12px);
            text-transform: uppercase;
            margin: 0; color: #d4af37; 
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5));
        }

        .subtitle { 
            font-weight: 300; opacity: 0.6; margin-bottom: 40px; 
            letter-spacing: 2px; font-size: clamp(0.7rem, 2vw, 0.9rem); 
        }

        /* Contenedor de botones adaptables */
        .button-group { 
            display: flex; flex-direction: column; gap: 18px; 
            width: 100%; max-width: 350px; 
        }

        .btn {
            text-decoration: none; padding: 20px; border-radius: 15px;
            font-weight: 600; text-transform: uppercase; transition: 0.4s;
            text-align: center; font-size: 1rem; letter-spacing: 1px;
            cursor: pointer; border: none; outline: none;
            display: block;
        }

        /* Botón Dorado (Canal) */
        .btn-canal { 
            background: #d4af37; color: #000; 
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3); 
        }
        
        /* Botón Estilo Negro/Dorado (Retiros) */
        .btn-retiros {
            background: rgba(0, 0, 0, 0.6); color: #d4af37; 
            border: 1px solid #d4af37;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* Efectos Hover solo para dispositivos con mouse */
        @media (hover: hover) {
            .btn-canal:hover { transform: translateY(-3px); background: #f1c40f; box-shadow: 0 6px 25px rgba(212, 175, 55, 0.5); }
            .btn-retiros:hover { background: rgba(212, 175, 55, 0.15); transform: translateY(-3px); }
        }

        /* Ajuste para pantallas muy pequeñas */
        @media (max-width: 380px) {
            .btn { padding: 16px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <div id="vanta-bg"></div>

    <div class="container">
        <h1>OASIS</h1>
        <p class="subtitle">REFUGIO DIGITAL SEGURO</p>
        
        <div class="button-group">
            <a href="https://whatsapp.com/channel/0029Vb7ZyqM3WHTTuRhyNB3M" class="btn btn-canal">Canal Oficial</a>
            <div onclick="openChat()" class="btn btn-retiros">RETIROS</div>
        </div>
    </div>

    <!-- Scripts de Animación 3D -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.lines.min.js"></script>
    
    <script>
        VANTA.LINES({
          el: "#vanta-bg",
          mouseControls: true, touchControls: true,
          scale: 1.00, scaleMobile: 1.00,
          color: 0xd4af37, backgroundColor: 0x0a0a0a,
          points: 10.00, maxDistance: 20.00, spacing: 18.00
        });

        function openChat() {
            if (window.callbell) {
                window.callbell.open();
            }
        }
    </script>

    <!-- Script de Callbell -->
    <script>
      if (!window.callbellSettings) { window.callbellSettings = {} }
      window.callbellSettings["uuid"] = "7980a6c9-f027-4666-82a7-4258788e21dd";
      window.callbellSettings["script_token"] = "GMfea5tb5E84JacftXguuZba";
      (function(){var w=window;var d=document;var l=function(){var s=d.createElement('script');s.async=true;s.src='https://dash.callbell.eu/include/livechat/'+window.callbellSettings.script_token+'/'+window.callbellSettings.uuid+'.js';var x=d.getElementsByTagName('script')[0];x.parentNode.insertBefore(s,x);};w.addEventListener('load',l,false);})();
    </script>

</body>
</html>
