<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OASIS - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-gold: #aa8a2e;
            --black-bg: #0a0a0a;
        }

        body {
            background-color: var(--black-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Imagen del personaje de fondo */
        .bg-image {
            position: fixed;
            right: -5%;
            bottom: 0;
            width: 70%;
            max-width: 800px;
            z-index: -1;
            opacity: 0.5; /* Ajusta la transparencia aquí */
            pointer-events: none;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.2));
        }

        .container {
            max-width: 600px;
            padding-top: 50px;
            position: relative;
            z-index: 1;
        }

        .card-vip {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid var(--gold);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
            backdrop-filter: blur(10px);
        }

        h1 {
            color: var(--gold);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-align: center;
        }

        .btn-gold {
            background: linear-gradient(145deg, var(--gold), var(--dark-gold));
            border: none;
            color: black;
            font-weight: bold;
            padding: 15px;
            border-radius: 10px;
            transition: all 0.3s;
            text-transform: uppercase;
            width: 100%;
            margin-bottom: 15px;
        }

        .btn-gold:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            background: var(--gold);
        }

        /* Animación para el mensaje de ayuda */
        .help-arrow {
            display: none;
            text-align: center;
            margin-top: 20px;
            animation: bounce 2s infinite;
            color: var(--gold);
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

    <!-- Esta es la imagen que acabas de subir -->
    <img src="assets/img/personaje.png" class="bg-image" alt="Oasis Visual">

    <div class="container">
        <div class="card-vip">
            <h1>Oasis</h1>
            
            <button class="btn-gold" onclick="mostrarAyuda()">Cargas</button>
            <button class="btn-gold" onclick="mostrarAyuda()">Retiros</button>
            <button class="btn-gold" onclick="location.href='https://wa.me/tu_numero'">Soporte VIP</button>

            <div id="mensaje-ayuda" class="help-arrow">
                <p>↓↓ Toca la burbuja de abajo para continuar ↓↓</p>
                <div style="font-size: 30px;">↘</div>
            </div>
        </div>
    </div>

    <script>
        function mostrarAyuda() {
            document.getElementById('mensaje-ayuda').style.display = 'block';
        }
    </script>

    <!-- Aquí va tu código de Callbell que ya tenías -->
    <!-- [PEGA AQUÍ TU SCRIPT DE CALLBELL SI LO TIENES] -->

</body>
</html>
