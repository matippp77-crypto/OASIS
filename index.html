<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #ffcc00;
            --black: #000000;
            --green: #25d366;
        }

        body {
            background-color: var(--black);
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ELIMINACIÓN DE CUADRITOS Y MEZCLA */
        .character-container {
            position: fixed;
            right: -20px;
            bottom: 0;
            z-index: -1;
            width: 85%;
            max-width: 750px;
            pointer-events: none;
            mix-blend-mode: screen; 
            opacity: 0.95;
        }

        .character-bg {
            width: 100%;
            filter: contrast(120%) brightness(90%);
            -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 95%);
            mask-image: linear-gradient(to left, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 95%);
        }

        .content {
            width: 90%;
            max-width: 450px;
            text-align: center;
            padding-top: 50px;
            z-index: 2;
        }

        /* OASIS CON AURA LLAMATIVA */
        h1 {
            font-size: 4.5rem;
            color: var(--gold);
            text-transform: uppercase;
            margin: 0;
            padding: 0;
            letter-spacing: 5px;
            /* Efecto Aura / Glow */
            text-shadow: 
                0 0 10px rgba(255, 204, 0, 0.8),
                0 0 30px rgba(255, 204, 0, 0.6),
                0 0 60px rgba(255, 204, 0, 0.4);
            animation: aura-glow 2s ease-in-out infinite alternate;
        }

        @keyframes aura-glow {
            from { text-shadow: 0 0 10px rgba(255, 204, 0, 0.8), 0 0 30px rgba(255, 204, 0, 0.4); }
            to { text-shadow: 0 0 20px rgba(255, 204, 0, 1), 0 0 50px rgba(255, 204, 0, 0.8), 0 0 80px rgba(255, 204, 0, 0.6); }
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; }

        .btn {
            background: var(--gold);
            color: black;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .btn-play { background: #fff; border: 4px solid var(--gold); font-size: 1.3rem; }
        
        .btn-whatsapp { background: var(--green); color: white; padding: 15px; margin-top: 5px; }

        /* SECCIÓN CANAL REESTRUCTURADA */
        .canal-container { margin-top: 10px; }
        .btn-canal {
            background: linear-gradient(45deg, #ff0000, #cc0000);
            color: white;
            font-size: 1.4rem;
            border: 2px solid white;
        }
        .canal-subtext {
            color: var(--gold);
            font-size: 0.85rem;
            font-weight: 700;
            margin-top: 8px;
            line-height: 1.4;
            text-shadow: 1px 1px 2px black;
        }

        #menu-respaldo { display: none; flex-direction: column; gap: 8px; margin-top: 5px; }

        /* FLECHA CHAT */
        #chat-pointer {
            display: none;
            position: fixed;
            bottom: 110px;
            right: 40px;
            z-index: 999;
            text-align: center;
            color: var(--gold);
            animation: jump 0.8s infinite;
        }

        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .extra-info { font-size: 0.6rem; margin-top: 40px; color: #555; }
    </style>
</head>
<body>

    <div class="character-container" id="personaje">
        <img src="assets/img/personaje.png" class="character-bg" alt="Oasis">
    </div>

    <div class="content">
        <h1>OASIS</h1>

        <div class="btn-group">
            <a href="https://greenvip.net" class="btn btn-play">🎰 ¡JUGÁ YA! 🎰</a>
            
            <button onclick="toggleCargas()" class="btn">💳 CARGAS RESPALDO</button>
            <div id="menu-respaldo">
                <a href="https://wa.me/5491122334455" class="btn btn-whatsapp">✅ CARGAS RESPALDO 1</a>
                <a href="https://wa.me/5491166778899" class="btn btn-whatsapp">✅ CARGAS RESPALDO 2</a>
            </div>

            <button onclick="abrirRetiros()" class="btn">💰 RETIROS (CHAT)</button>
            
            <!-- Sección Canal con 30% Extra -->
            <div class="canal-container">
                <a href="https://whatsapp.com/channel/0029Vb7TNUXJP20yPDX5Ga1p" class="btn btn-canal">📢 SOLO 30% EXTRA</a>
                <div class="canal-subtext">
                    unite al canal y activa la campanita <br> y llevate 30% mas 💎🎰
                </div>
            </div>
        </div>

        <p class="extra-info">OASIS ELITE © 2026 - SOPORTE 24HS</p>
    </div>

    <div id="chat-pointer">
        <div style="background:var(--gold); color:black; padding:5px 10px; border-radius:10px; font-weight:900; font-size:0.7rem; margin-bottom:5px;">CHAT DE RETIROS</div>
        <i class="fas fa-arrow-down fa-2x"></i>
    </div>

    <script>
        function toggleCargas() {
            const menu = document.getElementById('menu-respaldo');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        function abrirRetiros() {
            if (window.callbell) window.callbell.open();
            const p = document.getElementById('chat-pointer');
            p.style.display = 'block';
            setTimeout(() => { p.style.display = 'none'; }, 6000);
        }

        document.addEventListener('mousemove', (e) => {
            const img = document.getElementById('personaje');
            const x = (window.innerWidth / 2 - e.pageX) / 45;
            img.style.transform = `translateX(${x}px) rotateY(${x/2}deg)`;
        });
    </script>

    <!-- CALLBELL -->
    <script>
      window.callbellSettings = {
        uuid: "7980a6c9-f027-4666-82a7-4258788e21dd",
        script_token: "GMfea5tb5E84JacftXguuZba"
      };
      (function(){var w=window;var d=document;var l=function(){var s=d.createElement('script');s.async=true;s.src='https://dash.callbell.eu/include/livechat/'+window.callbellSettings.script_token+'/'+window.callbellSettings.uuid+'.js';var x=d.getElementsByTagName('script')[0];x.parentNode.insertBefore(s,x);};w.addEventListener('load',l,false);})();
    </script>

</body>
</html>
