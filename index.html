<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #ffcc00;
            --black: #000000;
            --green: #25d366;
        }

        body {
            background-color: var(--black);
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ELIMINACIÓN DE CUADRITOS Y EFECTO 3D */
        .character-container {
            position: fixed;
            right: -50px;
            bottom: 0;
            z-index: -1;
            width: 85%;
            max-width: 750px;
            pointer-events: none;
            transition: transform 0.1s ease-out;
        }

        .character-bg {
            width: 100%;
            /* Filtro para fundir los cuadros con el negro */
            filter: brightness(0.8) contrast(1.2);
            -webkit-mask-image: radial-gradient(circle at 60% 50%, black 20%, transparent 80%);
            mask-image: radial-gradient(circle at 60% 50%, black 20%, transparent 80%);
        }

        .content {
            width: 90%;
            max-width: 450px;
            text-align: center;
            padding-top: 20px;
            z-index: 2;
        }

        h1 {
            font-size: 3rem;
            color: var(--gold);
            text-transform: uppercase;
            margin: 10px 0 0 0;
            letter-spacing: 2px;
        }

        .promo-tag {
            background: linear-gradient(90deg, #ff0000, #990000);
            color: white;
            padding: 8px 25px;
            border-radius: 50px;
            font-weight: 900;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 0.8rem;
            border: 2px solid var(--gold);
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            background: var(--gold);
            color: black;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px;
            border-radius: 15px;
            font-weight: 900;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.2);
            transition: 0.3s;
        }

        .btn-play { background: #fff; border: 4px solid var(--gold); font-size: 1.3rem; }
        .btn-green { background: var(--green); color: white; margin-top: 5px; }

        .label-respaldo {
            margin: 20px 0 10px 0;
            font-weight: 900;
            color: var(--gold);
            font-size: 0.9rem;
        }

        /* FLECHA INDICADORA */
        #retiros-arrow {
            display: none;
            position: fixed;
            bottom: 110px;
            right: 40px;
            color: var(--gold);
            text-align: center;
            z-index: 1000;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* MENÚ OCULTO DE RESPALDO */
        #menu-respaldo { display: none; margin-top: 10px; }

        .extra-info { font-size: 0.6rem; margin-top: 30px; color: #444; letter-spacing: 1px; }

    </style>
</head>
<body>

    <div class="character-container" id="personaje">
        <img src="assets/img/personaje.png" class="character-bg" alt="Oasis">
    </div>

    <div class="content">
        <h1>OASIS</h1>
        <div class="promo-tag">🔥 EXTRA 30% DE REGALO 🔥</div>

        <div class="btn-group">
            <a href="https://greenvip.net" class="btn btn-play">🎰 ¡JUGÁ YA! 🎰</a>
            
            <!-- Botón que despliega los WhatsApp -->
            <button onclick="toggleRespaldo()" class="btn">💳 CARGAS RESPALDO</button>
            
            <div id="menu-respaldo">
                <a href="https://wa.me/5491122334455" class="btn btn-green">✅ CARGAS RESPALDO 1</a>
                <a href="https://wa.me/5491166778899" class="btn btn-green" style="margin-top:10px;">✅ CARGAS RESPALDO 2</a>
            </div>

            <button onclick="activarRetiros()" class="btn">💰 RETIROS (CHAT)</button>
            
            <a href="https://whatsapp.com/channel/0029Vb7TNUXJP20yPDX5Ga1p" class="btn">📢 UNITE AL CANAL</a>
        </div>

        <p class="extra-info">OASIS ELITE © 2026 - SOPORTE 24HS</p>
    </div>

    <!-- Flecha indicadora de Chat -->
    <div id="retiros-arrow">
        <div style="background: var(--gold); color:black; padding: 5px 10px; border-radius: 10px; font-weight:900; margin-bottom:10px;">TOCÁ EL CHAT AQUÍ</div>
        <i class="fas fa-arrow-down fa-3x"></i>
    </div>

    <script>
        // Función para mostrar los números de respaldo
        function toggleRespaldo() {
            const menu = document.getElementById('menu-respaldo');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        // Función para retiros y flecha
        function activarRetiros() {
            if (window.callbell) window.callbell.open();
            const arrow = document.getElementById('retiros-arrow');
            arrow.style.display = 'block';
            setTimeout(() => { arrow.style.display = 'none'; }, 6000);
        }

        // Movimiento 3D
        document.addEventListener('mousemove', (e) => {
            const img = document.getElementById('personaje');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            img.style.transform = `translateX(${x}px) translateY(${y}px) rotateY(${x}deg)`;
        });
    </script>

    <!-- CALLBELL -->
    <script>
      window.callbellSettings = {
        uuid: "7980a6c9-f027-4666-82a7-4258788e21dd",
        script_token: "GMfea5tb5E84JacftXguuZba"
      };
      (function(){var w=window;var d=document;var l=function(){var s=d.createElement('script');s.async=true;s.src='https://dash.callbell.eu/include/livechat/'+window.callbellSettings.script_token+'/'+window.callbellSettings.uuid+'.js';var x=d.getElementsByTagName('script')[0];x.parentNode.insertBefore(s,x);};w.addEventListener('load',l,false);})();
    </script>

</body>
</html>
