<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis | Soporte Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --wa-green: #25D366;
            --deep-dark: #020508;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        /* Ajuste para que todo quepa y sea desplazable en móviles */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: var(--deep-dark);
            color: #fff;
            overflow-x: hidden; /* Evita scroll horizontal */
            overflow-y: auto;   /* Permite scroll vertical si el contenido es largo */
        }

        #vanta-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* Iluminación dinámica */
        .lighting-glow {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(212, 175, 55, 0.08) 0%, transparent 50%);
            z-index: 2;
            pointer-events: none;
        }

        main {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Empieza desde arriba para móviles */
            padding: 60px 20px; /* Espacio para que respire el contenido */
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 1.2s ease-out;
        }

        h1 {
            font-size: clamp(2.5rem, 12vw, 5rem);
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 10px;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            margin-bottom: 15px;
        }

        /* Texto solicitado de la imagen */
        .subtitle {
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            line-height: 1.6;
            max-width: 600px;
            margin: 0 auto;
            opacity: 0.9;
            font-weight: 300;
            text-wrap: balance;
        }

        .stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 450px;
            perspective: 1000px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px 25px;
            text-decoration: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .glass-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--gold);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        .content { display: flex; align-items: center; gap: 15px; }

        .icon-wrap {
            width: 45px; height: 45px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }

        .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; display: block; }
        .main-text { font-size: 1.05rem; font-weight: 600; }

        .status-badge {
            font-size: 0.6rem;
            color: var(--wa-green);
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 2px;
        }

        .dot {
            width: 6px; height: 6px;
            background: var(--wa-green);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .divider {
            text-align: center;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 20px 0 10px;
            opacity: 0.4;
        }

        .num-indicator { opacity: 0.2; font-weight: 600; font-size: 0.9rem; }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Capa de palmeras (mejorada para móviles) */
        .palms {
            position: fixed;
            bottom: -20px;
            width: 100%;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            opacity: 0.4;
        }
        
        .palm-svg { width: 30%; max-width: 300px; }
    </style>
</head>
<body>

    <div id="vanta-canvas"></div>
    <div class="lighting-glow" id="glow"></div>

    <main>
        <div class="header">

            <!-- WhatsApps -->
            <a href="https://wa.me/595993482833" target="_blank" class="glass-card">
                <div class="content">

                    <div>
                        <div class="status-badge"><span class="dot"></span> ONLINE</div>
                        <span class="main-text">+595 993 482 833</span>
                    </div>
                </div>

            <a href="https://wa.me/595992659425" target="_blank" class="glass-card">

            <a href="https://wa.me/595992187028" target="_blank" class="glass-card">
                <div class="content">

                    <div>
                        <div class="status-badge"><span class="dot"></span> ONLINE</div>
                        <span class="main-text">+595 992 187 028</span>
                    </div>

        </div>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
    
    <script>
        // Fondo de aves suave
        VANTA.BIRDS({
            el: "#vanta-canvas",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            backgroundColor: 0x020508,
            color1: 0xd4af37,
            color2: 0x25d366,
            birdSize: 1.5,
            quantity: 3.0
        });

        // Seguimiento de luz con el mouse
        const glow = document.getElementById('glow');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            glow.style.setProperty('--x', x + '%');
            glow.style.setProperty('--y', y + '%');
        });

        function openChat() { if (window.callbell) { window.callbell.open(); } }
    </script>

      (function(){var w=window;var d=document;var l=function(){var s=d.createElement('script');s.async=true;s.src='https://dash.callbell.eu/include/livechat/'+window.callbellSettings.script_token+'/'+window.callbellSettings.uuid+'.js';var x=d.getElementsByTagName('script')[0];x.parentNode.insertBefore(s,x);};w.addEventListener('load',l,false);})();
    </script>
</body>
</html>
