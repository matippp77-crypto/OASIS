<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis - Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --green: #25d366; }

        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom, #1a1a2e 0%, #0a0a0a 100%);
            color: white;
            perspective: 2000px;
        }

        #scene-wrapper {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        /* Fondo de Isla Abstracto */
        #vanta-bg { 
            position: absolute; width: 100%; height: 100%; z-index: 1; 
            opacity: 0.5; transform: translateZ(-100px) scale(1.1);
        }

        /* Luna Nocturna */
        .moon {
            position: absolute; top: 40px; right: 40px;
            width: 70px; height: 70px;
            background-color: #fff; border-radius: 50%;
            box-shadow: 0 0 60px 15px rgba(212, 175, 55, 0.6);
            z-index: 2; transform: translateZ(50px);
        }

        .container {
            position: relative; z-index: 3;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100vh; text-align: center; 
            padding: 20px; transform: translateZ(150px);
        }

        h1 {
            font-size: clamp(3rem, 10vw, 5rem); letter-spacing: 10px;
            margin: 0; color: var(--gold); 
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.8);
            font-weight: 600; transform: translateZ(50px);
        }

        .button-group { 
            display: flex; flex-direction: column; gap: 12px; 
            width: 100%; max-width: 320px; margin-top: 25px; 
        }

        .btn {
            text-decoration: none; padding: 16px; border-radius: 12px;
            font-weight: 600; text-transform: uppercase; transition: 0.3s;
            text-align: center; cursor: pointer; border: none; font-size: 0.85rem;
            display: block; transform: translateZ(20px);
        }

        .btn-canal { background: var(--gold); color: #000; box-shadow: 0 10px 20px rgba(212, 175, 55, 0.4); }
        .btn-retiros { background: rgba(0,0,0,0.8); color: var(--gold); border: 1px solid var(--gold); backdrop-filter: blur(10px); }
        .btn-lineas { background: var(--green); color: white; font-size: 0.75rem; padding: 12px; }

        .support-label { 
            font-size: 0.75rem; opacity: 0.9; margin-top: 15px; 
            text-transform: uppercase; letter-spacing: 1px; color: #fff;
        }

        .btn:hover { transform: translateY(-5px) translateZ(60px) scale(1.05); filter: brightness(1.1); }
    </style>
</head>
<body>

    <div id="scene-wrapper">
        <div id="vanta-bg"></div>
        <div class="moon"></div>

        <div class="container">
            <h1>OASIS</h1>
            
            <div class="button-group">
                <a href="https://whatsapp.com/channel/0029Vb7TNUXJP20yPDX5Ga1p" class="btn btn-canal">Canal Oficial</a>
                
                <!-- BOTÓN RETIROS: Activa el Web Chat de Callbell -->
                <div onclick="openChat()" class="btn btn-retiros">RETIROS</div>
                
                <div class="support-label">Líneas de Respaldo:</div>
                <a href="https://wa.me/595991985831" class="btn btn-lineas">Línea de Respaldo 1</a>
                <a href="https://wa.me/595992199076" class="btn btn-lineas">Línea de Respaldo 2</a>
                <a href="https://wa.me/595992736161" class="btn btn-lineas">Línea de Respaldo 3</a>
            </div>
        </div>
    </div>

    <!-- Scripts de Animación -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
    
    <script>
        // Fondo 3D
        VANTA.BIRDS({
          el: "#vanta-bg",
          mouseControls: true, touchControls: true,
          color1: 0xd4af37, color2: 0x1a1a2e,
          backgroundColor: 0x0a0a0a, birdSize: 1.5, quantity: 4.0,
          backgroundAlpha: 0.0
        });

        // Movimiento de la escena con el mouse
        document.addEventListener("mousemove", (e) => {
            const scene = document.getElementById("scene-wrapper");
            const x = (window.innerWidth / 2 - e.pageX) / 25;
            const y = (window.innerHeight / 2 - e.pageY) / 25;
            scene.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });

        // Función para abrir el Web Chat de Callbell
        function openChat() { 
            if (window.callbell) { 
                window.callbell.open(); 
            } else {
                console.log("El chat aún se está cargando...");
            }
        }
    </script>

    <!-- Script de Callbell (Web Chat) -->
    <script>
      window.callbellSettings = {
        uuid: "7980a6c9-f027-4666-82a7-4258788e21dd",
        script_token: "GMfea5tb5E84JacftXguuZba"
      };
      (function(){var w=window;var d=document;var l=function(){var s=d.createElement('script');s.async=true;s.src='https://dash.callbell.eu/include/livechat/'+window.callbellSettings.script_token+'/'+window.callbellSettings.uuid+'.js';var x=d.getElementsByTagName('script')[0];x.parentNode.insertBefore(s,x);};w.addEventListener('load',l,false);})();
    </script>

</body>
</html>
