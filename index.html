<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto Oficial | Oasis</title>
    <!-- Fuentes Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #25D366; /* WhatsApp Green */
            --gold: #d4af37;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-box: border-box; }

        body, html {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: #050a0f;
            color: var(--text);
            overflow: hidden;
        }

        /* Contenedor 3D de Escena */
        #vanta-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* Capas de Ambiente (Isla y Palmeras) */
        .environment-layer {
            position: fixed;
            bottom: -50px;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 5%;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
        }

        .palm {
            width: 30vw;
            max-width: 400px;
            height: auto;
            transform-origin: bottom center;
            animation: windSway 6s ease-in-out infinite;
            opacity: 0.8;
        }

        .palm-right { transform: scaleX(-1); animation-delay: -2s; }

        @keyframes windSway {
            0%, 100% { transform: rotate(0deg) skewX(0deg); }
            50% { transform: rotate(2deg) skewX(1deg); }
        }

        /* Contenido Principal */
        main {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, rgba(10, 20, 30, 0.4) 0%, transparent 70%);
            padding: 20px;
            text-align: center;
        }

        .header-section {
            margin-bottom: 40px;
            max-width: 600px;
            animation: fadeInDown 1s ease-out;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 600;
            margin-bottom: 10px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        p.subtitle {
            font-size: 1rem;
            opacity: 0.9;
            font-weight: 300;
            line-height: 1.5;
        }

        /* Tarjetas Glassmorphism */
        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
            perspective: 1000px;
        }

        .contact-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px 30px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 0.6s ease-out both;
        }

        .contact-card:nth-child(2) { animation-delay: 0.2s; }
        .contact-card:nth-child(3) { animation-delay: 0.4s; }

        .contact-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent);
            box-shadow: 0 15px 35px rgba(37, 211, 102, 0.2);
        }

        .card-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .wa-icon {
            width: 40px;
            height: 40px;
            fill: var(--accent);
            filter: drop-shadow(0 0 5px rgba(37, 211, 102, 0.5));
        }

        .number-box {
            text-align: left;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 2s infinite;
        }

        .number-text {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .arrow {
            opacity: 0.5;
            transition: transform 0.3s ease;
        }

        .contact-card:hover .arrow {
            transform: translateX(5px);
            opacity: 1;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .palm { width: 45vw; }
            h1 { font-size: 2.2rem; }
            .cards-container { max-width: 90%; }
        }
    </style>
</head>

    <!-- Librerías de Animación -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
    
    <script>
        // Inicialización de Aves Realistas con Vanta.js
        VANTA.BIRDS({
            el: "#vanta-canvas",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            backgroundColor: 0x050a0f,
            color1: 0x25d366,
            color2: 0xd4af37,
            colorMode: "lerp",
            birdSize: 1.50,
            wingSpan: 24.00,
            speedLimit: 4.00,
            separation: 50.00,
            alignment: 20.00,
            cohesion: 20.00,
            quantity: 3.00
        });

        // Efecto de Inclinación 3D en Tarjetas
        const cards = document.querySelectorAll('.contact-card');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            
            cards.forEach(card => {
                card.style.transform = `rotateY(${xAxis}deg) rotateX(${-yAxis}deg)`;
            });
        });

        // Reset de posición al salir el mouse
        document.addEventListener('mouseleave', () => {
            cards.forEach(card => {
                card.style.transform = `rotateY(0deg) rotateX(0deg)`;
            });
        });
    </script>
