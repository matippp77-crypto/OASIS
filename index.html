<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis | Elite VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --green: #2ecc71;
            --orange: #e67e22;
            --red-promo: #e74c3c;
            --bg: #020508;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #vanta-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .container {
            width: 100%;
            max-width: 500px;
            z-index: 10;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            color: var(--gold);
            letter-spacing: 8px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
        }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Estilo Exacto de la Imagen */
        .btn-base {
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            text-decoration: none;
            color: black;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2);
        }

        .btn-juga { background: #f1c40f; }
        .btn-retiro { background: #2ecc71; }
        .btn-cargas { background: #e67e22; }
        .btn-promo-header { background: #e74c3c; border-radius: 12px 12px 0 0; color: white; }

        /* Contenedor Especial Extra 30% */
        .promo-container {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #e74c3c;
            border-radius: 12px;
            overflow: hidden;
        }

        .promo-text {
            padding: 12px;
            font-size: 0.75rem;
            color: #ccc;
            line-height: 1.3;
        }

        /* Menu Desplegable Cargas */
        #menu-cargas {
            display: none;
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 0 0 12px 12px;
            flex-direction: column;
            gap: 8px;
        }

        .link-carga {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 6px;
        }

        /* Horarios estilo imagen */
        .horarios-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .card-h {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-h h3 { font-size: 0.55rem; letter-spacing: 1px; color: #888; margin-bottom: 5px; }
        .card-h .time { font-size: 1.6rem; font-weight: 800; color: var(--gold); }

    </style>
</head>
<body>

    <div id="vanta-canvas"></div>

    <div class="container">
        <h1>OASIS</h1>

        <div class="button-stack">
            <!-- JUGÁ YA -->
            <a href="https://greenvip.net" target="_blank" class="btn-base btn-juga">
                🎰 JUGÁ YA 🎰
            </a>

            <!-- RETIROS -->
            <button onclick="openChat()" class="btn-base btn-retiro">
                ⚡ RETIROS ⚡
            </button>

            <!-- EXTRA 30% (Estilo Imagen) -->
            <div class="promo-container">
                <a href="https://whatsapp.com/channel/0029Vb7TNUXJP20yPDX5Ga1p" target="_blank" class="btn-base btn-promo-header" style="box-shadow:none;">
                    🎁 EXTRA 30% 🎁
                </a>
                <div class="promo-text">
                    Mandanos una captura y activa la campanita de que ya estas adentro del canal para activar tu bono.
                </div>
            </div>

            <!-- CARGAS RESPALDO -->
            <div>
                <button onclick="toggleCargas()" class="btn-base btn-cargas">
                    ⚡ CARGAS RESPALDO! ⚡
                </button>
                <div id="menu-cargas">
                    <a href="https://wa.me/595993482833" class="link-carga">Línea 1</a>
                    <a href="https://wa.me/595992659425" class="link-carga">Línea 2</a>
                    <a href="https://wa.me/595992187028" class="link-carga">Línea 3</a>
                </div>
            </div>
        </div>

        <div class="horarios-row">
            <div class="card-h">
                <h3>HORARIO DE RETIROS</h3>
                <div class="time">24 HS</div>
            </div>
            <div class="card-h">
                <h3>HORARIO DE CARGAS</h3>
                <div class="time">24 HS</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.dots.min.js"></script>
    <script>
        // Efecto DOTS de la imagen
        VANTA.DOTS({
            el: "#vanta-canvas",
            mouseControls: true,
            touchControls: true,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0xffcc00,
            backgroundColor: 0x020508,
            size: 1.20,
            spacing: 35.00,
            showLines: false
        });

        function openChat() { if (window.callbell) { window.callbell.open(); } }
        function toggleCargas() {
            const m = document.getElementById('menu-cargas');
            m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
        }
    </script>

    <!-- Callbell -->
    <script>
      window.callbellSettings = {
        uuid: "7980a6c9-f027-4666-82a7-4258788e21dd",
        script_token: "GMfea5tb5E84JacftXguuZba"
      };
      (function(){var w=window;var d=document;var l=function(){var s=d.createElement('script');s.async=true;s.src='https://dash.callbell.eu/include/livechat/'+window.callbellSettings.script_token+'/'+window.callbellSettings.uuid+'.js';var x=d.getElementsByTagName('script')[0];x.parentNode.insertBefore(s,x);};w.addEventListener('load',l,false);})();
    </script>
</body>
</html>
