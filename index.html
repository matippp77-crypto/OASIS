<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Oasis Elite</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root {
      --gold: #ffcc00;
      --green: #25d366;
      --green-dark: #128c44;
      --red: #e00000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      color: white;
      min-height: 100svh;
      overflow-x: hidden;
      position: relative;

      background-image:
        linear-gradient(
          90deg,
          rgba(0,0,0,0.94) 0%,
          rgba(0,0,0,0.82) 38%,
          rgba(0,0,0,0.42) 100%
        ),
        url("assets/img/fondo-oasis.png");

      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 35% 15%, rgba(255,204,0,0.12), transparent 26%),
        radial-gradient(circle at 85% 70%, rgba(37,211,102,0.07), transparent 26%),
        rgba(0,0,0,0.10);
      z-index: 0;
      pointer-events: none;
    }

    .page {
      position: relative;
      z-index: 3;
      width: 100%;
      min-height: 100svh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: clamp(12px, 2vw, 28px);
    }

    .content {
      width: min(92vw, 470px);
      text-align: center;
      position: relative;
      z-index: 5;
      margin-right: clamp(0px, 18vw, 260px);
    }

    h1 {
      font-size: clamp(3rem, 7vw, 4.7rem);
      line-height: 1;
      letter-spacing: clamp(2px, 0.7vw, 6px);
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: clamp(16px, 3vw, 24px);
      text-shadow:
        0 0 12px rgba(255, 204, 0, 0.78),
        0 0 30px rgba(255, 204, 0, 0.28),
        0 6px 18px rgba(0, 0, 0, 0.95);
      animation: titleGlow 2.3s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      from {
        text-shadow:
          0 0 10px rgba(255, 204, 0, 0.58),
          0 0 24px rgba(255, 204, 0, 0.18),
          0 6px 18px rgba(0, 0, 0, 0.95);
      }
      to {
        text-shadow:
          0 0 16px rgba(255, 204, 0, 0.90),
          0 0 36px rgba(255, 204, 0, 0.34),
          0 6px 20px rgba(0, 0, 0, 1);
      }
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: clamp(10px, 2vw, 14px);
    }

    .btn {
      width: 100%;
      min-height: clamp(52px, 7vw, 62px);
      padding: 14px 18px;
      border: none;
      border-radius: clamp(14px, 3vw, 20px);
      text-decoration: none;
      text-transform: uppercase;
      font-size: clamp(0.92rem, 2.2vw, 1.08rem);
      font-weight: 900;
      cursor: pointer;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      user-select: none;
      transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
      box-shadow:
        0 7px 0 rgba(125, 92, 0, 0.96),
        0 14px 28px rgba(0, 0, 0, 0.56),
        inset 0 2px 0 rgba(255, 255, 255, 0.58);
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.01);
      filter: brightness(1.05);
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow:
        0 2px 0 rgba(125, 92, 0, 0.96),
        0 8px 16px rgba(0, 0, 0, 0.38),
        inset 0 1px 0 rgba(255, 255, 255, 0.35);
    }

    .btn-play {
      background: linear-gradient(180deg, #ffffff 0%, #f3f3f3 55%, #cfcfcf 100%);
      border: 3px solid var(--gold);
      font-size: clamp(1rem, 2.5vw, 1.2rem);
    }

    .btn-main {
      background: linear-gradient(180deg, #ffe45f 0%, #ffcc00 58%, #d6a800 100%);
    }

    .btn-whatsapp {
      background: linear-gradient(180deg, #37f38e 0%, var(--green) 58%, var(--green-dark) 100%);
      color: white;
      min-height: 48px;
      font-size: clamp(0.85rem, 2vw, 0.95rem);
      box-shadow:
        0 6px 0 #0b6d32,
        0 12px 22px rgba(0, 0, 0, 0.36),
        inset 0 2px 0 rgba(255, 255, 255, 0.38);
    }

    #menu-respaldo {
      display: none;
      flex-direction: column;
      gap: 8px;
      margin-top: -3px;
      animation: openMenu 0.25s ease;
    }

    @keyframes openMenu {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .canal-wrapper {
      margin-top: 4px;
      background: rgba(0,0,0,0.50);
      border: 1px solid rgba(255, 204, 0, 0.48);
      border-radius: clamp(18px, 4vw, 26px);
      padding: clamp(13px, 3vw, 17px);
      box-shadow:
        0 0 0 1px rgba(255, 204, 0, 0.07),
        0 14px 38px rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(6px);
    }

    .btn-extra {
      background: linear-gradient(180deg, #ff4a4a 0%, #e00000 58%, #8a0000 100%);
      color: #fff;
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      border: 2px solid rgba(255,255,255,0.95);
      margin-bottom: 12px;
      box-shadow:
        0 7px 0 #610000,
        0 14px 26px rgba(0, 0, 0, 0.46),
        inset 0 2px 0 rgba(255, 255, 255, 0.42);
    }

    .canal-text {
      color: #f2f2f2;
      font-size: clamp(0.76rem, 2vw, 0.84rem);
      font-weight: 700;
      line-height: 1.45;
      text-shadow: 0 2px 5px rgba(0,0,0,0.90);
    }

    .canal-text b {
      color: var(--gold);
    }

    .footer-status {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: clamp(8px, 2vw, 12px);
      margin-top: 14px;
    }

    .status-box {
      background: rgba(0,0,0,0.54);
      border: 2px solid var(--gold);
      border-radius: 14px;
      padding: clamp(9px, 2vw, 12px) 6px;
      color: var(--gold);
      font-size: clamp(0.68rem, 2vw, 0.80rem);
      font-weight: 900;
      text-transform: uppercase;
      box-shadow:
        0 0 12px rgba(255, 204, 0, 0.18),
        0 8px 18px rgba(0,0,0,0.44);
      text-shadow: 0 2px 4px rgba(0,0,0,0.85);
    }

    .extra-info {
      margin-top: 16px;
      font-size: clamp(0.58rem, 1.8vw, 0.68rem);
      color: rgba(255,255,255,0.58);
      font-weight: 700;
      text-shadow: 0 2px 4px rgba(0,0,0,0.85);
    }

    /* PERSONAJE */
    .character-container {
      position: fixed;
      right: clamp(-28px, -2vw, -8px);
      bottom: 0;
      z-index: 2;
      width: clamp(230px, 31vw, 385px);
      pointer-events: none;
      opacity: 0.96;
      perspective: 1200px;
      transform-style: preserve-3d;
      transition: transform 0.18s ease-out;
      animation: characterFloat 6s ease-in-out infinite;
    }

    .character-bg {
      width: 100%;
      display: block;
      object-fit: contain;
      filter:
        drop-shadow(0 18px 34px rgba(0, 0, 0, 0.68))
        contrast(101%)
        brightness(100%)
        saturate(101%);
      transform-style: preserve-3d;
      animation: character3D 7s ease-in-out infinite;
    }

    @keyframes characterFloat {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-9px);
      }
    }

    @keyframes character3D {
      0%, 100% {
        transform: rotateY(-2.5deg) rotateX(0.8deg);
      }
      50% {
        transform: rotateY(2.5deg) rotateX(-0.8deg);
      }
    }

    /* AVES */
    .birds-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .real-bird {
      position: absolute;
      width: 52px;
      height: 32px;
      opacity: 0.55;
      filter:
        drop-shadow(0 0 4px rgba(255,255,255,0.20))
        drop-shadow(0 6px 8px rgba(0,0,0,0.35));
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    .body-bird {
      position: absolute;
      left: 20px;
      top: 14px;
      width: 16px;
      height: 8px;
      background: rgba(255,255,255,0.88);
      border-radius: 50%;
    }

    .body-bird::after {
      content: "";
      position: absolute;
      right: -5px;
      top: 1px;
      width: 7px;
      height: 6px;
      background: rgba(255,255,255,0.88);
      border-radius: 50%;
    }

    .wing {
      position: absolute;
      top: 12px;
      width: 28px;
      height: 12px;
      background: rgba(255,255,255,0.82);
      border-radius: 100% 100% 20% 20%;
    }

    .wing.left {
      left: 0;
      transform-origin: right center;
      animation: flapLeft 0.38s ease-in-out infinite alternate;
    }

    .wing.right {
      right: 0;
      transform-origin: left center;
      animation: flapRight 0.38s ease-in-out infinite alternate;
    }

    @keyframes flapLeft {
      0% {
        transform: rotate(-34deg) translateY(4px) scaleY(1.05);
      }
      100% {
        transform: rotate(34deg) translateY(-7px) scaleY(0.85);
      }
    }

    @keyframes flapRight {
      0% {
        transform: rotate(34deg) translateY(4px) scaleY(1.05);
      }
      100% {
        transform: rotate(-34deg) translateY(-7px) scaleY(0.85);
      }
    }

    .bird-a {
      top: 13%;
      left: -90px;
      animation: birdFlyA 12s infinite;
    }

    .bird-b {
      top: 24%;
      left: -120px;
      opacity: 0.44;
      animation: birdFlyB 17s infinite;
      animation-delay: 3s;
    }

    .bird-c {
      top: 8%;
      left: -140px;
      opacity: 0.36;
      animation: birdFlyC 21s infinite;
      animation-delay: 7s;
    }

    .bird-d {
      top: 34%;
      left: -160px;
      opacity: 0.30;
      animation: birdFlyD 19s infinite;
      animation-delay: 10s;
    }

    @keyframes birdFlyA {
      0% {
        transform: translateX(-120px) translateY(0) scale(1.05) rotate(0deg);
      }
      18% {
        transform: translateX(20vw) translateY(-22px) scale(1.12) rotate(-8deg);
      }
      42% {
        transform: translateX(46vw) translateY(16px) scale(1.05) rotate(7deg);
      }
      70% {
        transform: translateX(76vw) translateY(-12px) scale(1.10) rotate(-5deg);
      }
      100% {
        transform: translateX(116vw) translateY(5px) scale(1.05) rotate(0deg);
      }
    }

    @keyframes birdFlyB {
      0% {
        transform: translateX(-140px) translateY(0) scale(0.82) rotate(0deg);
      }
      25% {
        transform: translateX(26vw) translateY(20px) scale(0.88) rotate(7deg);
      }
      55% {
        transform: translateX(58vw) translateY(-18px) scale(0.84) rotate(-6deg);
      }
      100% {
        transform: translateX(116vw) translateY(8px) scale(0.82) rotate(0deg);
      }
    }

    @keyframes birdFlyC {
      0% {
        transform: translateX(-160px) translateY(0) scale(0.68) rotate(0deg);
      }
      22% {
        transform: translateX(25vw) translateY(-16px) scale(0.74) rotate(-9deg);
      }
      52% {
        transform: translateX(56vw) translateY(18px) scale(0.70) rotate(8deg);
      }
      100% {
        transform: translateX(116vw) translateY(-6px) scale(0.68) rotate(0deg);
      }
    }

    @keyframes birdFlyD {
      0% {
        transform: translateX(-180px) translateY(0) scale(0.76) rotate(0deg);
      }
      30% {
        transform: translateX(30vw) translateY(-20px) scale(0.82) rotate(-7deg);
      }
      63% {
        transform: translateX(68vw) translateY(14px) scale(0.78) rotate(6deg);
      }
      100% {
        transform: translateX(116vw) translateY(2px) scale(0.76) rotate(0deg);
      }
    }

    #chat-pointer {
      display: none;
      position: fixed;
      bottom: 118px;
      right: 42px;
      z-index: 1000;
      text-align: center;
      color: var(--gold);
      animation: bounce 0.8s infinite;
    }

    #chat-pointer .pointer-label {
      background: var(--gold);
      color: #000;
      padding: 7px 14px;
      border-radius: 12px;
      font-weight: 900;
      font-size: 0.72rem;
      margin-bottom: 6px;
      box-shadow: 0 0 14px rgba(255,204,0,0.45);
      white-space: nowrap;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-14px);
      }
    }

    /* TABLET */
    @media (max-width: 1024px) {
      body {
        background-position: center center;
      }

      .content {
        margin-right: 180px;
      }

      .character-container {
        width: clamp(250px, 32vw, 340px);
        right: -18px;
      }
    }

    /* CELULAR Y TABLET CHICA */
    @media (max-width: 768px) {
      body {
        background-attachment: scroll;
        background-position: center center;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.28);
        z-index: 0;
        pointer-events: none;
      }

      .page {
        align-items: flex-start;
        padding-top: 12px;
      }

      .content {
        width: min(92vw, 430px);
        margin-right: 0;
      }

      .character-container {
        width: clamp(210px, 58vw, 310px);
        right: -22vw;
        bottom: 0;
        opacity: 0.72;
      }

      .real-bird {
        width: 42px;
        height: 26px;
        opacity: 0.34;
      }

      #chat-pointer {
        right: 24px;
        bottom: 112px;
      }
    }

    /* CELULAR CHICO */
    @media (max-width: 430px) {
      body {
        background-position: 52% center;
      }

      .content {
        width: 93vw;
      }

      .btn {
        min-height: 52px;
      }

      .footer-status {
        grid-template-columns: 1fr 1fr;
      }

      .character-container {
        width: 74vw;
        right: -34vw;
        opacity: 0.62;
      }

      .canal-wrapper {
        background: rgba(0,0,0,0.58);
      }

      #chat-pointer {
        right: 15px;
        bottom: 108px;
      }

      #chat-pointer .pointer-label {
        font-size: 0.62rem;
        padding: 6px 10px;
      }
    }

    /* CELULAR MUY CHICO */
    @media (max-width: 360px) {
      h1 {
        font-size: 2.7rem;
      }

      .btn {
        font-size: 0.82rem;
        padding-inline: 10px;
      }

      .btn-extra {
        font-size: 1.05rem;
      }

      .canal-text {
        font-size: 0.70rem;
      }

      .status-box {
        font-size: 0.62rem;
      }
    }

    /* CELULAR HORIZONTAL */
    @media (max-height: 560px) and (orientation: landscape) {
      .page {
        padding-top: 8px;
      }

      .content {
        max-width: 400px;
        margin-right: 220px;
      }

      h1 {
        font-size: 2.8rem;
        margin-bottom: 12px;
      }

      .btn-group {
        gap: 8px;
      }

      .btn {
        min-height: 44px;
        padding: 10px 14px;
        font-size: 0.85rem;
      }

      .canal-wrapper {
        padding: 10px;
      }

      .canal-text {
        font-size: 0.68rem;
      }

      .footer-status {
        margin-top: 8px;
      }

      .status-box {
        padding: 8px 6px;
      }

      .extra-info {
        margin-top: 8px;
      }

      .character-container {
        width: 250px;
        right: -12px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>

<body>

  <div class="character-container" id="personaje">

            30% EXTRA 💎
          </a>

          <div class="canal-text">

            y llevate un <b>30% EXTRA</b> en tu próxima gestión 🚀

  <div id="chat-pointer">
    <div class="pointer-label">RETIRÁ AQUÍ</div>

  </div>

  <script>
    function toggleCargas() {
      const menu = document.getElementById('menu-respaldo');
      menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
    }

    function abrirRetiros() {
      if (window.callbell && typeof window.callbell.open === 'function') {
        window.callbell.open();
      } else {
        let intento = setInterval(() => {
          if (window.callbell && typeof window.callbell.open === 'function') {
            window.callbell.open();
            clearInterval(intento);
          }
        }, 500);

        setTimeout(() => clearInterval(intento), 6000);
      }

      const arrow = document.getElementById('chat-pointer');
      arrow.style.display = 'block';

      setTimeout(() => {
        arrow.style.display = 'none';
      }, 7000);
    }

    document.addEventListener('mousemove', (e) => {
      if (window.innerWidth < 768) return;

      const personaje = document.getElementById('personaje');
      const x = (window.innerWidth / 2 - e.clientX) / 95;
      const y = (window.innerHeight / 2 - e.clientY) / 130;

      personaje.style.transform = `
        translateY(-4px)
        rotateY(${x}deg)
        rotateX(${-y}deg)
      `;
    });

    document.addEventListener('mouseleave', () => {
      const personaje = document.getElementById('personaje');
      personaje.style.transform = 'translateY(0) rotateY(0deg) rotateX(0deg)';
    });
  </script>

  <script>
    window.callbellSettings = {
      uuid: "7980a6c9-f027-4666-82a7-4258788e21dd",
      script_token: "GMfea5tb5E84JacftXguuZba"
    };

    (function () {
      var w = window;
      var d = document;
      var l = function () {
        var s = d.createElement('script');
        s.async = true;
        s.src = 'https://dash.callbell.eu/include/livechat/' + window.callbellSettings.script_token + '/' + window.callbellSettings.uuid + '.js';
        var x = d.getElementsByTagName('script')[0];
        x.parentNode.insertBefore(s, x);
      };
      w.addEventListener('load', l, false);
    })();
  </script>
