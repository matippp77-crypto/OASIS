<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Elite</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #ffcc00;
            --black: #000000;
            --green: #25d366;
            --red: #ff0000;
        }

        body {
            background-color: var(--black);
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ELIMINACIÓN DE CUADRITOS */
        .character-container {
            position: fixed;
            right: -20px;
            bottom: 0;
            z-index: -1;
            width: 85%;
            max-width: 750px;
            pointer-events: none;
            mix-blend-mode: screen; 
            opacity: 0.95;
        }

        .character-bg {
            width: 100%;
            filter: contrast(125%) brightness(85%);
            -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 95%);
            mask-image: linear-gradient(to left, rgba(0,0,0,1) 60%, rgba(0,0,0,0) 95%);
        }

        .content {
            width: 90%;
            max-width: 450px;
            text-align: center;
            padding: 40px 0;
            z-index: 2;
        }

        /* OASIS CON AURA */
        h1 {
            font-size: 4.5rem;
            color: var(--gold);
            text-transform: uppercase;
            margin: 0;
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(255, 204, 0, 0.6);
            animation: aura 2s ease-in-out infinite alternate;
        }

        @keyframes aura {
            from { text-shadow: 0 0 15px rgba(255, 204, 0, 0.6); }
            to { text-shadow: 0 0 35px rgba(255, 204, 0, 0.9), 0 0 50px rgba(255, 204, 0, 0.4); }
        }

        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; }

        .btn {
            background: var(--gold);
            color: black;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-play { background: #fff; border: 3px solid var(--gold); font-size: 1.3rem; }
        .btn-whatsapp { background: var(--green); color: white; padding: 12px; font-size: 0.9rem; }

        /* SECCIÓN CANAL REFORZADA */
        .canal-wrapper { margin-top: 15px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,204,0,0.2); }
        .btn-extra { background: linear-gradient(45deg, #ff0000, #b30000); color: white; font-size: 1.5rem; border: 2px solid white; margin-bottom: 10px; }
        .canal-text { color: white; font-size: 0.85rem; font-weight: 600; line-height: 1.4; }
        .canal-text b { color: var(--gold); }

        /* CUADROS 24HS INFERIORES */
        .footer-status { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
        .status-box {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--gold);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 900;
            color: var(--gold);
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
        }

        #menu-respaldo { display: none; flex-direction: column; gap: 8px; margin-top: 5px; }

        /* FLECHA */
        #chat-pointer {
            display: none;
            position: fixed;
            bottom: 110px;
            right: 40px;
            z-index: 1000;
            text-align: center;
            color: var(--gold);
            animation: bounce 0.8s infinite;
        }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .extra-info { font-size: 0.6rem; margin-top: 30px; color: #555; }
    </style>
</head>
<body>

    <div class="character-container" id="personaje">
        <img src="assets/img/personaje.png" class="character-bg" alt="Oasis">
    </div>

    <div class="content">
        <h1>OASIS</h1>

        <div class="btn-group">
            <a href="https://greenvip.net" class="btn btn-play">🎰 ¡JUGÁ YA! 🎰</a>
            
            <button onclick="toggleCargas()" class="btn">💳 CARGAS RESPALDO</button>
            <div id="menu-respaldo">
                <a href="https://wa.me/5491122334455" class="btn btn-whatsapp">✅ RESPALDO 1</a>
                <a href="https://wa.me/5491166778899" class="btn btn-whatsapp">✅ RESPALDO 2</a>
            </div>

            <button onclick="abrirRetiros()" class="btn">💰 RETIROS (CHAT)</button>
            
            <!-- Bloque del Canal -->
            <div class="canal-wrapper">
                <a href="https://whatsapp.com/channel/0029Vb7TNUXJP20yPDX5Ga1p" class="btn btn-extra">30% EXTRA 💎</a>
                <div class="canal-text">
                    📲 Mandanos una captura mostrando que te uniste al canal y activaste la campanita 🔔<br>
                    y llevate un <b>30% EXTRA</b> en tu próxima gestión 🚀
                </div>
            </div>

            <!-- Cuadros 24hs -->
            <div class="footer-status">
                <div class="status-box">🟢 RETIROS 24HS</div>
                <div class="status-box">🟢 CARGAS 24HS</div>
            </div>
        </div>

        <p class="extra-info">OASIS ELITE © 2026 - SOPORTE 24HS</p>
    </div>

    <div id="chat-pointer">
        <div style="background:var(--gold); color:black; padding:5px 12px; border-radius:10px; font-weight:900; font-size:0.7rem; margin-bottom:5px;">RETIRÁ AQUÍ</div>
        <i class="fas fa-arrow-down fa-2x"></i>
    </div>

    <script>
        function toggleCargas() {
            const menu = document.getElementById('menu-respaldo');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }

        function abrirRetiros() {
            if (window.callbell) window.callbell.open();
            const arrow = document.getElementById('chat-pointer');
            arrow.style.display = 'block';
            setTimeout(() => { arrow.style.display = 'none'; }, 7000);
        }

        document.addEventListener('mousemove', (e) => {
            const img = document.getElementById('personaje');
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            img.style.transform = `translateX(${x}px)`;
        });
    </script>

    <!-- CALLBELL -->
    <script>
      window.callbellSettings = {
        uuid: "7980a6c9-f027-4666-82a7-4258788e21dd",
        script_token: "GMfea5tb5E84JacftXguuZba"
      };
      (function(){var w=window;var d=document;var l=function(){var s=d.createElement('script');s.async=true;s.src='https://dash.callbell.eu/include/livechat/'+window.callbellSettings.script_token+'/'+window.callbellSettings.uuid+'.js';var x=d.getElementsByTagName('script')[0];x.parentNode.insertBefore(s,x);};w.addEventListener('load',l,false);})();
    </script>

</body>
</html>
