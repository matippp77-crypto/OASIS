<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis | Central Supremo</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --wa-green: #25D366;
            --deep-dark: #020508;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: default; }

        body, html {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: var(--deep-dark);
            color: #fff;
            overflow: hidden;
            perspective: 2000px;
        }

        #vanta-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* Ambiente de Isla Suprema */
        .island-layer {
            position: fixed;
            bottom: -50px;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 4%;
        }

        .palm {
            width: 32vw;
            max-width: 450px;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.8));
            animation: supremeSway 10s ease-in-out infinite;
            transform-origin: bottom center;
        }

        .palm-right { transform: scaleX(-1); animation-delay: -4s; }

        @keyframes supremeSway {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(2.5deg) scale(1.02) skewX(1deg); }
        }

        /* Overlay de Iluminación */
        .lighting-glow {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(212, 175, 55, 0.08) 0%, transparent 50%);
            z-index: 3;
            pointer-events: none;
        }

        main {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 45px;
            animation: fadeInDown 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        h1 {
            font-size: clamp(3rem, 10vw, 5.5rem);
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 15px;
            text-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
            font-weight: 300;
        }

        /* Grid de Opciones Premium */
        .stack {
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 100%;
            max-width: 440px;
            transform-style: preserve-3d;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 22px 30px;
            text-decoration: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
        }

        /* Brillo interno dinámico */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .glass-card:hover::before { left: 100%; }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-8px) scale(1.02) translateZ(50px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
        }

        .content { display: flex; align-items: center; gap: 20px; }

        .icon-wrap {
            width: 52px; height: 52px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
            transition: 0.3s;
        }

        .glass-card:hover .icon-wrap {
            background: var(--gold);
            color: #000;
            transform: rotate(-10deg);
        }

        .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; opacity: 0.4; display: block; }
        .main-text { font-size: 1.2rem; font-weight: 600; letter-spacing: 1px; }

        .status-badge {
            font-size: 0.65rem;
            color: var(--wa-green);
            display: flex;
            align-items: center;
            gap: 6px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .dot {
            width: 6px; height: 6px;
            background: var(--wa-green);
            border-radius: 50%;
            animation: supremePulse 2s infinite;
        }

        @keyframes supremePulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { transform: scale(1.3); box-shadow: 0 0 0 10px rgba(37, 211, 102, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        .divider {
            text-align: center;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin: 25px 0 10px;
            opacity: 0.3;
        }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-40px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

    <script>
        // Fondo Vanta Birds - Configuración Ultra Fina
        VANTA.BIRDS({
            el: "#vanta-canvas",
            mouseControls: true, touchControls: true,
            minHeight: 200.00, minWidth: 200.00,
            scale: 1.00, scaleMobile: 1.00,
            backgroundColor: 0x020508,
            color1: 0x25d366, color2: 0xd4af37,
            birdSize: 1.20, wingSpan: 30.00,
            speedLimit: 3.00, separation: 60.00, alignment: 10.00, cohesion: 10.00,
            quantity: 3.00
        });

        // Seguimiento de Luz y Parallax 3D
        const glow = document.getElementById('glow');
        const scene = document.getElementById('scene');

        document.addEventListener('mousemove', (e) => {
            // Actualizar luz dinámica
            const xPct = (e.clientX / window.innerWidth) * 100;
            const yPct = (e.clientY / window.innerHeight) * 100;
            glow.style.setProperty('--x', xPct + '%');
            glow.style.setProperty('--y', yPct + '%');

            // Parallax 3D para la lista
            const xRot = (window.innerWidth / 2 - e.pageX) / 40;
            const yRot = (window.innerHeight / 2 - e.pageY) / 40;
            scene.style.transform = `rotateY(${xRot}deg) rotateX(${-yRot}deg)`;
        });

        function openChat() { if (window.callbell) { window.callbell.open(); } }
    </script>
