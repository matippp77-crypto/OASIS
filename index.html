<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis | Elite VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffcc00;
            --green: #00ff66;
            --orange: #ff4500;
            --bg: #020508;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
        }

        #vanta-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }

        .container {
            width: 100%;
            max-width: 600px;
            z-index: 10;
            text-align: center;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 4.5rem);
            font-weight: 800;
            color: var(--gold);
            letter-spacing: 10px;
            margin-bottom: 30px;
            text-shadow: 0 10px 20px rgba(255, 204, 0, 0.2);
        }

        .button-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Estilo Botones 3D Pro */
        .btn-3d {
            position: relative;
            padding: 18px;
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            text-decoration: none;
            color: black;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-3d:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,0.4) !important; }

        .btn-juga { background: linear-gradient(#ffdf33, #d4af37); box-shadow: 0 6px 0 #b38f00; }
        .btn-retiro { background: linear-gradient(#2ecc71, #27ae60); box-shadow: 0 6px 0 #1e8449; }
        .btn-extra { background: linear-gradient(#ff4500, #c0392b); box-shadow: 0 6px 0 #922b21; color: white; }

        /* Sección Cargas Respaldo */
        .cargas-section {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .btn-cargas {
            width: 100%;
            padding: 18px;
            background: linear-gradient(#e67e22, #d35400);
            box-shadow: 0 6px 0 #a04000;
            color: black;
            font-weight: 800;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        #menu-numeros {
            display: none;
            padding: 15px;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .num-link {
            background: rgba(255,255,255,0.08);
            padding: 12px;
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .num-link:hover { background: rgba(255,255,255,0.2); }

        /* Instrucción Extra */
        .promo-box {
            margin-top: 5px;
            padding: 15px;
            font-size: 0.85rem;
            line-height: 1.4;
            color: rgba(255,255,255,0.8);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* Horarios */
        .horarios-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .card-h {
            background: var(--glass);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card-h h3 { font-size: 0.65rem; letter-spacing: 2px; opacity: 0.6; margin-bottom: 5px; }
        .card-h .time { font-size: 1.8rem; font-weight: 800; color: var(--gold); }

    </style>
</head>
<body>

    <div id="vanta-canvas"></div>

    <div class="container">
        <h1>OASIS</h1>

        <div class="button-stack">
            <!-- JUGA ACÁ -->
            <a href="https://greenvip.net" target="_blank" class="btn-3d btn-juga">
                🎰 CONSERVÁ EL JUGÁ ACÁ 🎰
            </a>

            <!-- RETIROS -->
            <button onclick="openChat()" class="btn-3d btn-retiro">
                ⚡ RETIROS ⚡
            </button>

            <!-- EXTRA 30% (VINCULADO AL CANAL) -->
            <div class="cargas-section" style="border: 1px solid var(--orange);">
                <a href="https://whatsapp.com/channel/0029Vb7TNUXJP20yPDX5Ga1p" target="_blank" class="btn-3d btn-extra">
                    🎁 EXTRA 30% 🎁
                </a>
                <div class="promo-box">
                    Mandanos una captura y activa la campanita de que ya estas adentro del canal para activar tu bono.
                </div>
            </div>

            <!-- CARGAS RESPALDO -->
            <div class="cargas-section">
                <button onclick="toggleNumeros()" class="btn-cargas">
                    ⚡ CARGAS RESPALDO! ⚡
                </button>
                <div id="menu-numeros">
                    <a href="https://wa.me/595993482833" class="num-link">Línea de Carga 1</a>
                    <a href="https://wa.me/595992659425" class="num-link">Línea de Carga 2</a>
                    <a href="https://wa.me/595992187028" class="num-link">Línea de Carga 3</a>
                </div>
            </div>
        </div>

        <div class="horarios-grid">
            <div class="card-h">
                <h3>HORARIO DE RETIROS</h3>
                <div class="time">24 HS</div>
            </div>
            <div class="card-h">
                <h3>HORARIO DE CARGAS</h3>
                <div class="time">24 HS</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.dots.min.js"></script>
    <script>
        VANTA.DOTS({
            el: "#vanta-canvas",
            mouseControls: true, touchControls: true,
            minHeight: 200.00, minWidth: 200.00,
            scale: 1.00, scaleMobile: 1.00,
            color: 0xffcc00, backgroundColor: 0x020508,
            size: 1.20, spacing: 35.00
        });

        function openChat() { if (window.callbell) { window.callbell.open(); } }
        function toggleNumeros() {
            const menu = document.getElementById('menu-numeros');
            menu.style.display = menu.style.display === 'grid' ? 'none' : 'grid';
        }
    </script>

    <!-- Callbell Script -->
    <script>
      window.callbellSettings = {
        uuid: "7980a6c9-f027-4666-82a7-4258788e21dd",
        script_token: "GMfea5tb5E84JacftXguuZba"
      };
      (function(){var w=window;var d=document;var l=function(){var s=d.createElement('script');s.async=true;s.src='https://dash.callbell.eu/include/livechat/'+window.callbellSettings.script_token+'/'+window.callbellSettings.uuid+'.js';var x=d.getElementsByTagName('script')[0];x.parentNode.insertBefore(s,x);};w.addEventListener('load',l,false);})();
    </script>
</body>
</html>
