<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis | Central de Contacto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent-wa: #25D366;
            --gold: #d4af37;
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: #050a0f;
            color: var(--text);
            overflow-x: hidden;
        }

        #vanta-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* Ambiente Isla */
        .environment-layer {
            position: fixed;
            bottom: -20px;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 5%;
            opacity: 0.6;
        }

        .palm {
            width: 25vw;
            max-width: 350px;
            animation: windSway 8s ease-in-out infinite;
            transform-origin: bottom center;
        }

        .palm-right { transform: scaleX(-1); animation-delay: -3s; }

        @keyframes windSway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(3deg) skewX(1deg); }
        }

        /* Contenido */
        main {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background: radial-gradient(circle at center, rgba(10, 25, 40, 0.3) 0%, transparent 80%);
        }

        .header-section {
            margin-bottom: 30px;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 600;
            color: var(--gold);
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 0.95rem;
            opacity: 0.8;
            max-width: 500px;
            margin: 10px auto;
        }

        /* Contenedor de Opciones */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 420px;
            perspective: 1000px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 18px 25px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        /* Estilos específicos por tipo */
        .card-main { border-left: 4px solid var(--gold); }
        .card-chat { border-left: 4px solid #3498db; }
        .card-wa { border-left: 4px solid var(--accent-wa); }

        .card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .info { display: flex; align-items: center; gap: 15px; text-align: left; }
        
        .icon-circle {
            width: 45px; height: 45px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; }
        .title { font-size: 1.1rem; font-weight: 600; display: block; }

        .status-dot {
            width: 8px; height: 8px;
            background: var(--accent-wa);
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 10px var(--accent-wa);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .section-divider {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 20px 0 10px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div id="vanta-canvas"></div>

    <div class="environment-layer">

            <path fill="#021a0a" d="M100,200 Q90,150 100,100 Q110,150 100,200 Z" />
            <path fill="#053a15" d="M100,100 Q60,80 20,110 Q60,95 100,100 Z" />
            <path fill="#053a15" d="M100,100 Q70,50 40,30 Q80,60 100,100 Z" />
            <path fill="#053a15" d="M100,100 Q130,50 160,30 Q120,60 100,100 Z" />
            <path fill="#053a15" d="M100,100 Q140,80 180,110 Q140,95 100,100 Z" />
        </svg>
        <svg class="palm palm-right" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

            <path fill="#053a15" d="M100,100 Q60,80 20,110 Q60,95 100,100 Z" />

    </main>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.birds.min.js"></script>
    
    <script>
        // Animación de Aves Realistas
        VANTA.BIRDS({
            el: "#vanta-canvas",
            mouseControls: true, touchControls: true,
            minHeight: 200.00, minWidth: 200.00,
            scale: 1.00, scaleMobile: 1.00,
            backgroundColor: 0x050a0f,
            color1: 0x25d366, color2: 0xd4af37,
            birdSize: 1.80, wingSpan: 20.00,
            speedLimit: 3.00, quantity: 4.00
        });

        // Movimiento 3D Suave
        const scene = document.querySelector('.options-grid');
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 35;
            const y = (window.innerHeight / 2 - e.pageY) / 35;
            scene.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });

        // Integración de Callbell
        function openChat() { if (window.callbell) { window.callbell.open(); } }
    </script>

</body>
